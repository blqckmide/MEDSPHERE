<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MEDSPHERE Live Score | Student Union Cup 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a2c3e;
    }
    .header {
      background: #1a2c3e;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .logo h1 {
      font-family: 'Audiowide', cursive;
      font-size: 1.1rem;
      font-weight: 400;
      color: white;
      letter-spacing: 1px;
    }
    .logo h1 span { font-weight: 300; opacity: 0.8; }
    .tournament-badge {
      background: #2d4a6e;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #ffdf7e;
    }
    .matches-container { max-width: 900px; margin: 1rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1.2rem; }
    .match-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid #e9ecef;
    }
    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.2rem;
      background: white;
    }
    .team { text-align: center; flex: 1; }
    .team-name { font-weight: 700; font-size: 1rem; color: #1a2c3e; }
    .team-score { font-size: 1.8rem; font-weight: 800; color: #2d4a6e; }
    .vs { font-size: 0.8rem; color: #94a3b8; font-weight: 600; padding: 0 12px; }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 1.2rem;
      background: #f8fafc;
      border-top: 1px solid #eef2f8;
      font-size: 0.65rem;
    }
    .match-time { background: #2d4a6e; color: white; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .match-status { padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .status-live { background: #dc2626; color: white; animation: pulse 1s infinite; }
    .status-ended { background: #4b5563; color: white; }
    .status-upcoming { background: #e2e8f0; color: #475569; }
    @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    .stadium { padding: 0.3rem 1.2rem 0.5rem; font-size: 0.6rem; color: #64748b; display: flex; align-items: center; gap: 6px; }
    .tabs { display: flex; border-top: 1px solid #eef2f8; background: white; }
    .tab-btn { flex: 1; padding: 0.6rem; background: none; border: none; font-size: 0.7rem; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { color: #2d4a6e; border-bottom: 2px solid #2d4a6e; background: #fafcff; }
    .tab-content { display: none; padding: 1rem; background: white; border-top: 1px solid #eef2f8; }
    .tab-content.active { display: block; }
    .events-list { list-style: none; }
    .events-list li { padding: 5px 0; font-size: 0.7rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f2f5; }
    .event-time { font-weight: 700; color: #2d4a6e; min-width: 40px; }
    /* Stats - FlashScore style */
    .stats-top { display: flex; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .stat-badge { background: #eef2f8; padding: 4px 8px; border-radius: 20px; font-size: 0.65rem; font-weight: 600; color: #1a2c3e; }
    .stat-section { margin-bottom: 1rem; }
    .stat-section h4 { font-size: 0.7rem; font-weight: 700; color: #2d4a6e; margin-bottom: 0.5rem; border-left: 2px solid #2d4a6e; padding-left: 6px; }
    .stat-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.7rem; border-bottom: 1px solid #f0f2f5; }
    .stat-label { font-weight: 500; color: #475569; }
    .stat-value { font-weight: 600; color: #1a2c3e; }
    .stat-value-home { color: #2d4a6e; }
    .stat-value-away { color: #64748b; }
    /* Line-up */
    .lineup-container { display: flex; flex-direction: column; gap: 1.5rem; }
    .team-lineup { background: #f8fafc; border-radius: 16px; padding: 0.8rem; }
    .team-lineup h4 { font-size: 0.8rem; font-weight: 700; color: #1a2c3e; margin-bottom: 12px; border-left: 3px solid #2d4a6e; padding-left: 8px; }
    .players-grid { display: flex; flex-wrap: wrap; gap: 12px; }
    .player-item { display: flex; align-items: center; gap: 8px; width: calc(33% - 12px); min-width: 120px; }
    .player-number { background: #c8102e; color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 800; font-size: 0.75rem; }
    .player-name { font-size: 0.7rem; font-weight: 500; color: #1e293b; }
    .formation-badge { display: inline-block; background: #eef2f8; padding: 2px 10px; border-radius: 20px; font-size: 0.6rem; font-weight: 600; color: #2d4a6e; margin-bottom: 10px; }
    footer { text-align: center; padding: 0.8rem; font-size: 0.6rem; color: #6c7a8e; background: white; border-top: 1px solid #eef2f8; margin-top: 1rem; }
    @media (max-width: 600px) {
      .team-score { font-size: 1.3rem; }
      .team-name { font-size: 0.8rem; }
      .player-item { width: calc(50% - 12px); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><h1>⚡ MEDSPHERE <span>LIVE SCORE</span></h1></div>
    <div class="tournament-badge">🏆 STUDENT UNION CUP 2026</div>
  </div>
  <main><div class="matches-container" id="matchesList"></div></main>
  <footer><p>Powered by <strong>MEDSPHERE</strong> | Live updates</p></footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyB8Lgw7WzFuCBw5OaYTQebQ8I4JgjuohFU",
      authDomain: "medsphere-c794d.firebaseapp.com",
      projectId: "medsphere-c794d",
      storageBucket: "medsphere-c794d.firebasestorage.app",
      messagingSenderId: "962864542783",
      appId: "1:962864542783:web:b59e6abda9c6f1a9fc348a",
      measurementId: "G-HPQ46648M4"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchesRef = ref(db, 'matches');
    
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;': m==='>'?'&gt;': m); }
    
    function renderEvents(match) {
      const events = [];
      (match.scorers || []).forEach(s => events.push({time: s.time, text: `⚽ ${escapeHtml(s.name)}`}));
      (match.yellowCards || []).forEach(c => events.push({time: c.time, text: `🟨 ${escapeHtml(c.player)}`}));
      (match.redCards || []).forEach(c => events.push({time: c.time, text: `🟥 ${escapeHtml(c.player)}`}));
      events.sort((a,b)=> (parseInt(a.time)||0) - (parseInt(b.time)||0));
      return events.map(e => `<li><span class="event-time">${e.time}'</span>${e.text}</li>`).join('') || '<li>No events</li>';
    }
    
    function renderStats(match) {
      const stats = match.stats || {
        possession: { home: 50, away: 50 },
        totalShots: { home: 0, away: 0 },
        shotsOnTarget: { home: 0, away: 0 },
        bigChances: { home: 0, away: 0 },
        corners: { home: 0, away: 0 },
        passesPercent: { home: 0, away: 0 },
        shotsInsideBox: { home: 0, away: 0 },
        shotsOutsideBox: { home: 0, away: 0 },
        blockedShots: { home: 0, away: 0 },
        hitWoodwork: { home: 0, away: 0 }
      };
      return `
        <div class="stats-top">
          <span class="stat-badge">⚡ ${stats.possession?.home || 50}% Ball possession</span>
          <span class="stat-badge">⚡ ${stats.possession?.away || 50}% Ball possession</span>
        </div>
        
        <div class="stat-section">
          <h4>Top stats</h4>
          <div class="stat-row"><span class="stat-label">Ball possession</span><span><span class="stat-value-home">${stats.possession?.home || 50}%</span> | <span class="stat-value-away">${stats.possession?.away || 50}%</span></span></div>
          <div class="stat-row"><span class="stat-label">Total shots</span><span><span class="stat-value-home">${stats.totalShots?.home || 0}</span> | <span class="stat-value-away">${stats.totalShots?.away || 0}</span></span></div>
          <div class="stat-row"><span class="stat-label">Shots on target</span><span><span class="stat-value-home">${stats.shotsOnTarget?.home || 0}</span> | <span class="stat-value-away">${stats.shotsOnTarget?.away || 0}</span></span></div>
          <div class="stat-row"><span class="stat-label">Big chances</span><span><span class="stat-value-home">${stats.bigChances?.home || 0}</span> | <span class="stat-value-away">${stats.bigChances?.away || 0}</span></span></div>
          <div class="stat-row"><span class="stat-label">Corner kicks</span><span><span class="stat-value-home">${stats.corners?.home || 0}</span> | <span class="stat-value-away">${stats.corners?.away || 0}</span></span></div>
          <div class="stat-row"><span class="stat-label">Passes (%)</span><span><span class="stat-value-home">${stats.passesPercent?.home || 0}%</span> | <span class="stat-value-away">${stats.passesPercent?.away || 0}%</span></span></div>
        </div>
        
        <div class="stat-section">
          <h4>Shots</h4>
          <div class="stat-row"><span class="stat-label">Total shots</span><span><span class="stat-value-home">${stats.totalShots?.home || 0}</span> | <span class="stat-value-away">${stats.totalShots?.away || 0}</span></span></div>
          <div class="stat-row"><span class="stat-label">Shots on target</span><span><span class="stat-value-home">${stats.shotsOnTarget?.home || 0}</span> | <span class="stat-value-away">${stats.shotsOnTarget?.away || 0}</span></span></div>
          <div class="stat-row"><span class="stat-label">Shots inside box</span><span><span class="stat-value-home">${stats.shotsInsideBox?.home || 0}</span> | <span class="stat-value-away">${stats.shotsInsideBox?.away || 0}</span></span></div>
          <div class="stat-row"><span class="stat-label">Shots outside box</span><span><span class="stat-value-home">${stats.shotsOutsideBox?.home || 0}</span> | <span class="stat-value-away">${stats.shotsOutsideBox?.away || 0}</span></span></div>
          <div class="stat-row"><span class="stat-label">Blocked shots</span><span><span class="stat-value-home">${stats.blockedShots?.home || 0}</span> | <span class="stat-value-away">${stats.blockedShots?.away || 0}</span></span></div>
          <div class="stat-row"><span class="stat-label">Hit woodwork</span><span><span class="stat-value-home">${stats.hitWoodwork?.home || 0}</span> | <span class="stat-value-away">${stats.hitWoodwork?.away || 0}</span></span></div>
        </div>
      `;
    }
    
    function renderLineup(players, teamName, formation) {
      if(!players || players.length===0) return `<div class="team-lineup"><h4>${escapeHtml(teamName)}</h4><div style="text-align:center; padding:1rem;">No line-up added</div></div>`;
      return `
        <div class="team-lineup">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <h4>${escapeHtml(teamName)}</h4>
            <span class="formation-badge">${escapeHtml(formation || '4-4-2')}</span>
          </div>
          <div class="players-grid">
            ${players.map(p => `
              <div class="player-item">
                <div class="player-number">${p.number}</div>
                <div class="player-name">${escapeHtml(p.name)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
    
    function renderMatches(matches) {
      const container = document.getElementById('matchesList');
      if(!matches || Object.keys(matches).length===0) { container.innerHTML = '<div style="text-align:center;padding:2rem;">🏟️ No matches scheduled.</div>'; return; }
      const matchesArray = Object.values(matches);
      container.innerHTML = matchesArray.map((match, idx) => {
        const statusClass = match.status==='LIVE'?'status-live': match.status==='ENDED'?'status-ended':'status-upcoming';
        const statusText = match.status==='LIVE'?'⚡ LIVE': match.status==='ENDED'?'🏁 ENDED':'📅 UPCOMING';
        const timeDisplay = match.time || (match.status==='LIVE'?'45\'': match.status==='ENDED'?'FT':'--');
        return `
          <div class="match-card">
            <div class="match-header">
              <div class="team"><div class="team-name">${escapeHtml(match.homeTeam)}</div><div class="team-score">${match.homeScore||0}</div></div>
              <div class="vs">VS</div>
              <div class="team"><div class="team-name">${escapeHtml(match.awayTeam)}</div><div class="team-score">${match.awayScore||0}</div></div>
            </div>
            <div class="status-row"><span class="match-time">⏱️ ${escapeHtml(timeDisplay)}</span><span class="match-status ${statusClass}">${statusText}</span></div>
            <div class="stadium">🏟️ ${escapeHtml(match.stadium || 'TBD')}</div>
            <div class="tabs"><button class="tab-btn active" data-tab="summary-${idx}">Summary</button><button class="tab-btn" data-tab="lineup-${idx}">Line-ups</button><button class="tab-btn" data-tab="stats-${idx}">Stats</button></div>
            <div id="summary-${idx}" class="tab-content active"><ul class="events-list">${renderEvents(match)}</ul></div>
            <div id="lineup-${idx}" class="tab-content"><div class="lineup-container">${renderLineup(match.homeLineup || [], match.homeTeam, match.homeFormation)}${renderLineup(match.awayLineup || [], match.awayTeam, match.awayFormation)}</div></div>
            <div id="stats-${idx}" class="tab-content">${renderStats(match)}</div>
          </div>
        `;
      }).join('');
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const parent = btn.closest('.match-card');
          const tabId = btn.dataset.tab;
          const content = document.getElementById(tabId);
          const isActive = content.classList.contains('active');
          parent.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
          parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          if (!isActive) {
            content.classList.add('active');
            btn.classList.add('active');
          }
        });
      });
    }
    
    onValue(matchesRef, (snapshot) => renderMatches(snapshot.val()));
  </script>
</body>
</html>
