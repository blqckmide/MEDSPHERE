<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MEDSPHERE Live Score | Student Union Cup 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a2c3e;
    }
    /* Header - LiveScore style */
    .header {
      background: #1a2c3e;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }
    .logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
    }
    .logo h1 span { font-weight: 500; opacity: 0.8; }
    .tournament-badge {
      background: #2d4a6e;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #ffdf7e;
    }
    /* Matches container */
    .matches-container { max-width: 900px; margin: 1rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1rem; }
    /* Match card */
    .match-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid #e9ecef;
    }
    /* Match header - teams and score */
    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.2rem;
      background: white;
    }
    .team { text-align: center; flex: 1; }
    .team-name { font-weight: 700; font-size: 1rem; color: #1a2c3e; }
    .team-score { font-size: 1.8rem; font-weight: 800; color: #2d4a6e; }
    .vs { font-size: 0.8rem; color: #94a3b8; font-weight: 600; padding: 0 12px; }
    /* Status row */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 1.2rem;
      background: #f8fafc;
      border-top: 1px solid #eef2f8;
      font-size: 0.7rem;
    }
    .match-time {
      background: #2d4a6e;
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .match-status {
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .status-live { background: #dc2626; color: white; animation: pulse 1s infinite; }
    .status-ended { background: #4b5563; color: white; }
    .status-upcoming { background: #e2e8f0; color: #475569; }
    @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    /* Stadium */
    .stadium {
      padding: 0.3rem 1.2rem 0.6rem;
      font-size: 0.65rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    /* Tabs */
    .tabs {
      display: flex;
      border-top: 1px solid #eef2f8;
      background: white;
    }
    .tab-btn {
      flex: 1;
      padding: 0.7rem;
      background: none;
      border: none;
      font-size: 0.7rem;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active {
      color: #2d4a6e;
      border-bottom: 2px solid #2d4a6e;
      background: #fafcff;
    }
    /* Tab content */
    .tab-content { display: none; padding: 1rem; background: white; border-top: 1px solid #eef2f8; }
    .tab-content.active { display: block; }
    /* Events timeline */
    .events-list { list-style: none; }
    .events-list li {
      padding: 6px 0;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #f0f2f5;
    }
    .event-time { font-weight: 700; color: #2d4a6e; min-width: 40px; }
    .event-icon { min-width: 24px; }
    /* Line-ups with formation */
    .formation-badge {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: #2d4a6e;
      margin-bottom: 12px;
      padding: 4px;
      background: #f0f4f9;
      border-radius: 20px;
      display: inline-block;
      width: auto;
    }
    .lineup-pitch {
      background: linear-gradient(145deg, #1b5e3a, #0f4a2c);
      border-radius: 20px;
      padding: 1rem;
      margin-top: 8px;
    }
    .pitch-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .pitch-player {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.65rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .h2h-section { font-size: 0.75rem; color: #475569; text-align: center; padding: 1rem; }
    footer { text-align: center; padding: 1rem; font-size: 0.65rem; color: #6c7a8e; background: white; border-top: 1px solid #eef2f8; margin-top: 1rem; }
    @media (max-width: 600px) {
      .team-score { font-size: 1.4rem; }
      .team-name { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><h1>⚡ MEDSPHERE <span>LIVE SCORE</span></h1></div>
    <div class="tournament-badge">🏆 STUDENT UNION CUP 2026</div>
  </div>
  <main><div class="matches-container" id="matchesList"></div></main>
  <footer><p>Powered by <strong>MEDSPHERE</strong> | Live updates</p></footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyB8Lgw7WzFuCBw5OaYTQebQ8I4JgjuohFU",
      authDomain: "medsphere-c794d.firebaseapp.com",
      projectId: "medsphere-c794d",
      storageBucket: "medsphere-c794d.firebasestorage.app",
      messagingSenderId: "962864542783",
      appId: "1:962864542783:web:b59e6abda9c6f1a9fc348a",
      measurementId: "G-HPQ46648M4"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchesRef = ref(db, 'matches');
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;': m==='>'?'&gt;': m); }
    function renderEvents(match) {
      const events = [];
      (match.scorers || []).forEach(s => events.push({time: s.time, text: `⚽ ${escapeHtml(s.name)}`, type: 'goal'}));
      (match.yellowCards || []).forEach(c => events.push({time: c.time, text: `🟨 ${escapeHtml(c.player)}`, type: 'yellow'}));
      (match.redCards || []).forEach(c => events.push({time: c.time, text: `🟥 ${escapeHtml(c.player)}`, type: 'red'}));
      events.sort((a,b)=> (parseInt(a.time)||0) - (parseInt(b.time)||0));
      return events.map(e => `<li><span class="event-time">${e.time}'</span><span class="event-icon">${e.text}</span></li>`).join('') || '<li>No events</li>';
    }
    function renderLineups(match) {
      const home = match.homeLineup || [];
      const away = match.awayLineup || [];
      const formation = match.formation || '4-4-2';
      const group = (players) => {
        const gk = players.filter(p=>p.position==='GK');
        const def = players.filter(p=>['LB','CB','RB','LWB','RWB'].includes(p.position));
        const mid = players.filter(p=>['DMF','CMF','AMF','LMF','RMF'].includes(p.position));
        const fwd = players.filter(p=>['LWF','RWF','SS','CF'].includes(p.position));
        return {gk, def, mid, fwd};
      };
      const homeG = group(home), awayG = group(away);
      return `
        <div style="margin-bottom:20px;"><div class="formation-badge">${escapeHtml(match.homeTeam)} — ${escapeHtml(formation)}</div><div class="lineup-pitch"><div class="pitch-row">${homeG.gk.map(p=>`<div class="pitch-player">👕 ${p.number} ${escapeHtml(p.name)}</div>`).join('')}</div><div class="pitch-row">${homeG.def.map(p=>`<div class="pitch-player">👕 ${p.number} ${escapeHtml(p.name)}</div>`).join('')}</div><div class="pitch-row">${homeG.mid.map(p=>`<div class="pitch-player">👕 ${p.number} ${escapeHtml(p.name)}</div>`).join('')}</div><div class="pitch-row">${homeG.fwd.map(p=>`<div class="pitch-player">👕 ${p.number} ${escapeHtml(p.name)}</div>`).join('')}</div></div></div>
        <div><div class="formation-badge">${escapeHtml(match.awayTeam)} — ${escapeHtml(formation)}</div><div class="lineup-pitch"><div class="pitch-row">${awayG.gk.map(p=>`<div class="pitch-player">👕 ${p.number} ${escapeHtml(p.name)}</div>`).join('')}</div><div class="pitch-row">${awayG.def.map(p=>`<div class="pitch-player">👕 ${p.number} ${escapeHtml(p.name)}</div>`).join('')}</div><div class="pitch-row">${awayG.mid.map(p=>`<div class="pitch-player">👕 ${p.number} ${escapeHtml(p.name)}</div>`).join('')}</div><div class="pitch-row">${awayG.fwd.map(p=>`<div class="pitch-player">👕 ${p.number} ${escapeHtml(p.name)}</div>`).join('')}</div></div></div>
      `;
    }
    function renderMatches(matches) {
      const container = document.getElementById('matchesList');
      if(!matches || Object.keys(matches).length===0) { container.innerHTML = '<div style="text-align:center;padding:2rem;">🏟️ No matches scheduled.</div>'; return; }
      const matchesArray = Object.values(matches);
      container.innerHTML = matchesArray.map((match, idx) => {
        const statusClass = match.status==='LIVE'?'status-live': match.status==='ENDED'?'status-ended':'status-upcoming';
        const statusText = match.status==='LIVE'?'⚡ LIVE': match.status==='ENDED'?'🏁 ENDED':'📅 UPCOMING';
        const timeDisplay = match.time || (match.status==='LIVE'?'45\'': match.status==='ENDED'?'FT':'--');
        return `
          <div class="match-card" data-match-idx="${idx}">
            <div class="match-header"><div class="team"><div class="team-name">${escapeHtml(match.homeTeam)}</div><div class="team-score">${match.homeScore||0}</div></div><div class="vs">VS</div><div class="team"><div class="team-name">${escapeHtml(match.awayTeam)}</div><div class="team-score">${match.awayScore||0}</div></div></div>
            <div class="status-row"><span class="match-time">⏱️ ${escapeHtml(timeDisplay)}</span><span class="match-status ${statusClass}">${statusText}</span></div>
            <div class="stadium">🏟️ ${escapeHtml(match.stadium || 'TBD')}</div>
            <div class="tabs"><button class="tab-btn active" data-tab="info-${idx}">Info</button><button class="tab-btn" data-tab="summary-${idx}">Summary</button><button class="tab-btn" data-tab="lineup-${idx}">Line-ups</button><button class="tab-btn" data-tab="h2h-${idx}">H2H</button></div>
            <div id="info-${idx}" class="tab-content active"><div style="font-size:0.75rem; color:#475569;">ℹ️ Match info not available yet.</div></div>
            <div id="summary-${idx}" class="tab-content"><ul class="events-list">${renderEvents(match)}</ul></div>
            <div id="lineup-${idx}" class="tab-content">${renderLineups(match)}</div>
            <div id="h2h-${idx}" class="tab-content"><div class="h2h-section">📊 Head-to-head records will appear here.</div></div>
          </div>
        `;
      }).join('');
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const parent = btn.closest('.match-card');
          const tabId = btn.dataset.tab;
          parent.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
          parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.getElementById(tabId).classList.add('active');
          btn.classList.add('active');
        });
      });
    }
    onValue(matchesRef, (snapshot) => renderMatches(snapshot.val()));
  </script>
</body>
</html>
