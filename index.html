<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MEDSPHERE Live Score | Student Union Cup 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6fa;
      color: #0a0c12;
      line-height: 1.4;
    }

    /* Header with gradient */
    .hero {
      background: linear-gradient(135deg, #b91c1c 0%, #7f1a1a 100%);
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 1%, transparent 1%);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .hero h1 span {
      font-weight: 500;
      opacity: 0.95;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(4px);
      padding: 6px 18px;
      border-radius: 40px;
      margin-top: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Matches container */
    .matches-container {
      max-width: 850px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* Match card */
    .match-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
      transition: all 0.25s ease;
      border: 1px solid #eef2f8;
    }

    .match-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.08);
    }

    /* Status row — left: period, right: status */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 1.25rem;
      background: #fbfdfe;
      border-bottom: 1px solid #edf2f7;
    }

    .period-badge {
      background: #c8102e;
      color: white;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .status-badge {
      background: #f0f4fa;
      color: #2d3a4b;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* Score area */
    .score-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem;
      gap: 1rem;
    }

    .team {
      flex: 1;
      text-align: center;
    }

    .team-name {
      font-weight: 700;
      font-size: 1rem;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .team-score {
      font-size: 2rem;
      font-weight: 800;
      color: #b91c1c;
      line-height: 1;
    }

    .vs-circle {
      background: #f0f4fa;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: 700;
      font-size: 0.8rem;
      color: #4a5b6e;
    }

    /* Details grid */
    .details-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 0 1.25rem 1.25rem;
    }

    .detail-card {
      flex: 1;
      min-width: 140px;
      background: #fefcfa;
      border-radius: 18px;
      padding: 0.75rem 0.9rem;
      border: 1px solid #f0e7e7;
    }

    .detail-card h4 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #b91c1c;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-list {
      list-style: none;
      padding: 0;
    }

    .detail-list li {
      font-size: 0.75rem;
      padding: 5px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1f2a3e;
      border-bottom: 1px dashed #f0e0e0;
    }

    .detail-list li:last-child {
      border-bottom: none;
    }

    .goal-marker { color: #16a34a; font-weight: 600; }
    .yellow-marker { color: #eab308; }
    .red-marker { color: #dc2626; }
    .event-marker { color: #3b82f6; }

    /* Line-ups section */
    .lineup-section {
      padding: 0 1.25rem 1.25rem;
      border-top: 1px solid #f0f0f0;
      margin-top: 0.5rem;
    }

    .lineup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .lineup-box {
      background: #fafcff;
      border-radius: 16px;
      padding: 0.8rem;
      border: 1px solid #ecf3fa;
    }

    .lineup-box h4 {
      font-size: 0.75rem;
      font-weight: 700;
      color: #c8102e;
      margin-bottom: 8px;
    }

    .lineup-list {
      list-style: none;
      padding: 0;
      font-size: 0.7rem;
      color: #334155;
    }

    .lineup-list li {
      padding: 4px 0;
      border-bottom: 1px dashed #eef2f6;
    }

    /* No matches */
    .no-matches {
      text-align: center;
      padding: 2.5rem;
      background: white;
      border-radius: 28px;
      color: #6c7a91;
      font-weight: 500;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 1.6rem;
      font-size: 0.7rem;
      color: #6f7c93;
      border-top: 1px solid #eef2f8;
      margin-top: 2.5rem;
      background: white;
    }

    footer strong {
      color: #b91c1c;
    }

    @media (max-width: 650px) {
      .hero h1 { font-size: 1.4rem; }
      .team-score { font-size: 1.5rem; }
      .team-name { font-size: 0.85rem; }
      .details-grid { flex-direction: column; gap: 0.75rem; }
      .lineup-grid { grid-template-columns: 1fr; }
      .status-row { flex-direction: column; gap: 6px; align-items: stretch; text-align: center; }
      .period-badge, .status-badge { text-align: center; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <h1>⚡ MEDSPHERE <span>LIVE SCORE</span></h1>
      <div class="category-badge">
        🏆 STUDENT UNION CUP 2026
      </div>
    </div>
  </div>

  <main>
    <div class="matches-container" id="matchesList">
      <div class="no-matches">📢 Loading matches...</div>
    </div>
  </main>

  <footer>
    <p>Powered by <strong>MEDSPHERE</strong> | Real‑time updates</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8Lgw7WzFuCBw5OaYTQebQ8I4JgjuohFU",
      authDomain: "medsphere-c794d.firebaseapp.com",
      projectId: "medsphere-c794d",
      storageBucket: "medsphere-c794d.firebasestorage.app",
      messagingSenderId: "962864542783",
      appId: "1:962864542783:web:b59e6abda9c6f1a9fc348a",
      measurementId: "G-HPQ46648M4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchesRef = ref(db, 'matches');

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function renderMatches(matches) {
      const container = document.getElementById('matchesList');
      if (!matches || Object.keys(matches).length === 0) {
        container.innerHTML = '<div class="no-matches">🏟️ No matches scheduled yet. Check back later.</div>';
        return;
      }

      const matchesArray = Object.values(matches);
      container.innerHTML = matchesArray.map(match => `
        <div class="match-card">
          <div class="status-row">
            <span class="period-badge">${escapeHtml(match.period || 'First half')}</span>
            <span class="status-badge">${escapeHtml(match.status || 'Not started')}</span>
          </div>
          <div class="score-area">
            <div class="team">
              <div class="team-name">${escapeHtml(match.homeTeam)}</div>
              <div class="team-score">${match.homeScore || 0}</div>
            </div>
            <div class="vs-circle">VS</div>
            <div class="team">
              <div class="team-name">${escapeHtml(match.awayTeam)}</div>
              <div class="team-score">${match.awayScore || 0}</div>
            </div>
          </div>
          <div class="details-grid">
            <div class="detail-card">
              <h4>⚽ GOALS</h4>
              <ul class="detail-list">
                ${(match.scorers || []).map(s => `<li><span class="goal-marker">⚽</span> ${escapeHtml(s.name)} <span style="color:#5f6c84;">${s.time}</span></li>`).join('')}
              </ul>
            </div>
            <div class="detail-card">
              <h4>🟨 YELLOW</h4>
              <ul class="detail-list">
                ${(match.yellowCards || []).map(c => `<li><span class="yellow-marker">🟨</span> ${escapeHtml(c.player)} <span style="color:#5f6c84;">${c.time}</span></li>`).join('')}
              </ul>
            </div>
            <div class="detail-card">
              <h4>🟥 RED</h4>
              <ul class="detail-list">
                ${(match.redCards || []).map(c => `<li><span class="red-marker">🟥</span> ${escapeHtml(c.player)} <span style="color:#5f6c84;">${c.time}</span></li>`).join('')}
              </ul>
            </div>
            <div class="detail-card">
              <h4>📋 EVENTS</h4>
              <ul class="detail-list">
                ${(match.events || []).map(e => `<li><span class="event-marker">📌</span> ${escapeHtml(e)}</li>`).join('')}
              </ul>
            </div>
          </div>
          ${(match.homeLineup?.length || match.awayLineup?.length) ? `
          <div class="lineup-section">
            <div class="lineup-grid">
              <div class="lineup-box">
                <h4>📋 ${escapeHtml(match.homeTeam)} Starting XI</h4>
                <ul class="lineup-list">
                  ${(match.homeLineup || []).map(p => `<li>⚡ ${escapeHtml(p)}</li>`).join('') || '<li style="color:#aaa;">No line-up added</li>'}
                </ul>
              </div>
              <div class="lineup-box">
                <h4>📋 ${escapeHtml(match.awayTeam)} Starting XI</h4>
                <ul class="lineup-list">
                  ${(match.awayLineup || []).map(p => `<li>⚡ ${escapeHtml(p)}</li>`).join('') || '<li style="color:#aaa;">No line-up added</li>'}
                </ul>
              </div>
            </div>
          </div>
          ` : ''}
        </div>
      `).join('');
    }

    onValue(matchesRef, (snapshot) => {
      renderMatches(snapshot.val());
    });
  </script>
</body>
</html>
