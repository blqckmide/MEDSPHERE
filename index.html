<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MEDSPHERE Live Score | Student Union Cup 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a2c3e;
    }
    .header {
      background: #1a2c3e;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .logo h1 {
      font-family: 'Audiowide', cursive;
      font-size: 1.1rem;
      font-weight: 400;
      color: white;
      letter-spacing: 1px;
    }
    .logo h1 span { font-weight: 300; opacity: 0.8; font-family: 'Audiowide', cursive; }
    .tournament-badge {
      background: #2d4a6e;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #ffdf7e;
    }
    .matches-container { max-width: 900px; margin: 1rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .match-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid #e9ecef;
    }
    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.2rem;
      background: white;
    }
    .team { text-align: center; flex: 1; }
    .team-name { font-weight: 700; font-size: 0.95rem; color: #1a2c3e; }
    .team-score { font-size: 1.6rem; font-weight: 800; color: #2d4a6e; }
    .vs { font-size: 0.75rem; color: #94a3b8; font-weight: 600; padding: 0 12px; }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 1.2rem;
      background: #f8fafc;
      border-top: 1px solid #eef2f8;
      font-size: 0.65rem;
    }
    .match-time { background: #2d4a6e; color: white; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .match-status { padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .status-live { background: #dc2626; color: white; animation: pulse 1s infinite; }
    .status-ended { background: #4b5563; color: white; }
    .status-upcoming { background: #e2e8f0; color: #475569; }
    @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    .stadium { padding: 0.3rem 1.2rem 0.5rem; font-size: 0.6rem; color: #64748b; display: flex; align-items: center; gap: 6px; }
    .tabs { display: flex; border-top: 1px solid #eef2f8; background: white; }
    .tab-btn { flex: 1; padding: 0.6rem; background: none; border: none; font-size: 0.7rem; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { color: #2d4a6e; border-bottom: 2px solid #2d4a6e; background: #fafcff; }
    .tab-content { display: none; padding: 1rem; background: white; border-top: 1px solid #eef2f8; }
    .tab-content.active { display: block; }
    .events-list { list-style: none; }
    .events-list li { padding: 5px 0; font-size: 0.7rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f2f5; }
    .event-time { font-weight: 700; color: #2d4a6e; min-width: 40px; }
    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .stat-col { text-align: center; }
    .stat-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.7rem; border-bottom: 1px solid #eef2f8; }
    .stat-label { font-weight: 600; color: #475569; }
    /* Pitch with green lines */
    .pitch-container {
      background: linear-gradient(145deg, #1b5e3a, #0f4a2c);
      border-radius: 20px;
      padding: 1rem;
      position: relative;
      background-image: 
        repeating-linear-gradient(transparent, transparent 24px, rgba(255,255,255,0.15) 24px, rgba(255,255,255,0.15) 25px),
        repeating-linear-gradient(90deg, transparent, transparent 24px, rgba(255,255,255,0.1) 24px, rgba(255,255,255,0.1) 25px);
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .pitch-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 12px 0;
      flex-wrap: wrap;
    }
    .pitch-number {
      background: #c8102e;
      color: white;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: 800;
      font-size: 0.85rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .team-formation { margin-bottom: 20px; }
    .formation-badge {
      text-align: center;
      font-size: 0.6rem;
      font-weight: 600;
      color: #ffdf7e;
      margin-bottom: 8px;
      background: rgba(0,0,0,0.5);
      display: inline-block;
      padding: 2px 12px;
      border-radius: 20px;
    }
    footer { text-align: center; padding: 0.8rem; font-size: 0.6rem; color: #6c7a8e; background: white; border-top: 1px solid #eef2f8; margin-top: 1rem; }
    @media (max-width: 600px) {
      .team-score { font-size: 1.3rem; }
      .team-name { font-size: 0.8rem; }
      .pitch-number { width: 28px; height: 28px; font-size: 0.7rem; }
      .pitch-row { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><h1>⚡ MEDSPHERE <span>LIVE SCORE</span></h1></div>
    <div class="tournament-badge">🏆 STUDENT UNION CUP 2026</div>
  </div>
  <main><div class="matches-container" id="matchesList"></div></main>
  <footer><p>Powered by <strong>MEDSPHERE</strong> | Live updates</p></footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyB8Lgw7WzFuCBw5OaYTQebQ8I4JgjuohFU",
      authDomain: "medsphere-c794d.firebaseapp.com",
      projectId: "medsphere-c794d",
      storageBucket: "medsphere-c794d.firebasestorage.app",
      messagingSenderId: "962864542783",
      appId: "1:962864542783:web:b59e6abda9c6f1a9fc348a",
      measurementId: "G-HPQ46648M4"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchesRef = ref(db, 'matches');
    
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;': m==='>'?'&gt;': m); }
    
    function renderEvents(match) {
      const events = [];
      (match.scorers || []).forEach(s => events.push({time: s.time, text: `⚽ ${escapeHtml(s.name)}`}));
      (match.yellowCards || []).forEach(c => events.push({time: c.time, text: `🟨 ${escapeHtml(c.player)}`}));
      (match.redCards || []).forEach(c => events.push({time: c.time, text: `🟥 ${escapeHtml(c.player)}`}));
      events.sort((a,b)=> (parseInt(a.time)||0) - (parseInt(b.time)||0));
      return events.map(e => `<li><span class="event-time">${e.time}'</span>${e.text}</li>`).join('') || '<li>No events</li>';
    }
    
    function renderStats(match) {
      const stats = match.stats || { possession: { home: 50, away: 50 }, shotsOnTarget: { home: 0, away: 0 }, shotsOffTarget: { home: 0, away: 0 }, passes: { home: 0, away: 0 } };
      return `
        <div class="stats-grid">
          <div class="stat-col">
            <div class="stat-item"><span class="stat-label">Possession</span><span>${stats.possession?.home || 0}%</span></div>
            <div class="stat-item"><span class="stat-label">Shots on target</span><span>${stats.shotsOnTarget?.home || 0}</span></div>
            <div class="stat-item"><span class="stat-label">Shots off target</span><span>${stats.shotsOffTarget?.home || 0}</span></div>
            <div class="stat-item"><span class="stat-label">Passes</span><span>${stats.passes?.home || 0}</span></div>
          </div>
          <div class="stat-col">
            <div class="stat-item"><span class="stat-label">Possession</span><span>${stats.possession?.away || 0}%</span></div>
            <div class="stat-item"><span class="stat-label">Shots on target</span><span>${stats.shotsOnTarget?.away || 0}</span></div>
            <div class="stat-item"><span class="stat-label">Shots off target</span><span>${stats.shotsOffTarget?.away || 0}</span></div>
            <div class="stat-item"><span class="stat-label">Passes</span><span>${stats.passes?.away || 0}</span></div>
          </div>
        </div>
      `;
    }
    
    function renderPitchLineup(players) {
      if(!players || players.length===0) return '<div class="pitch-container" style="justify-content:center; align-items:center;">No line-up</div>';
      const gk = players.filter(p=>p.position==='GK');
      const def = players.filter(p=>['LB','CB','RB','LWB','RWB'].includes(p.position));
      const mid = players.filter(p=>['DMF','CMF','AMF','LMF','RMF'].includes(p.position));
      const att = players.filter(p=>['LWF','RWF','SS','CF'].includes(p.position));
      return `
        <div class="pitch-container">
          <div class="pitch-row">${gk.map(p=>`<div class="pitch-number">${p.number}</div>`).join('')}</div>
          <div class="pitch-row">${def.map(p=>`<div class="pitch-number">${p.number}</div>`).join('')}</div>
          <div class="pitch-row">${mid.map(p=>`<div class="pitch-number">${p.number}</div>`).join('')}</div>
          <div class="pitch-row">${att.map(p=>`<div class="pitch-number">${p.number}</div>`).join('')}</div>
        </div>
      `;
    }
    
    function renderMatches(matches) {
      const container = document.getElementById('matchesList');
      if(!matches || Object.keys(matches).length===0) { container.innerHTML = '<div style="text-align:center;padding:2rem;">🏟️ No matches scheduled.</div>'; return; }
      const matchesArray = Object.values(matches);
      container.innerHTML = matchesArray.map((match, idx) => {
        const statusClass = match.status==='LIVE'?'status-live': match.status==='ENDED'?'status-ended':'status-upcoming';
        const statusText = match.status==='LIVE'?'⚡ LIVE': match.status==='ENDED'?'🏁 ENDED':'📅 UPCOMING';
        const timeDisplay = match.time || (match.status==='LIVE'?'45\'': match.status==='ENDED'?'FT':'--');
        return `
          <div class="match-card" data-match-idx="${idx}">
            <div class="match-header"><div class="team"><div class="team-name">${escapeHtml(match.homeTeam)}</div><div class="team-score">${match.homeScore||0}</div></div><div class="vs">VS</div><div class="team"><div class="team-name">${escapeHtml(match.awayTeam)}</div><div class="team-score">${match.awayScore||0}</div></div></div>
            <div class="status-row"><span class="match-time">⏱️ ${escapeHtml(timeDisplay)}</span><span class="match-status ${statusClass}">${statusText}</span></div>
            <div class="stadium">🏟️ ${escapeHtml(match.stadium || 'TBD')}</div>
            <div class="tabs"><button class="tab-btn active" data-tab="summary-${idx}">Summary</button><button class="tab-btn" data-tab="lineup-${idx}">Line-ups</button><button class="tab-btn" data-tab="stats-${idx}">Stats</button></div>
            <div id="summary-${idx}" class="tab-content active"><ul class="events-list">${renderEvents(match)}</ul></div>
            <div id="lineup-${idx}" class="tab-content">
              <div class="team-formation"><div style="text-align:center;"><span class="formation-badge">${escapeHtml(match.homeTeam)} — ${escapeHtml(match.homeFormation||'4-4-2')}</span></div>${renderPitchLineup(match.homeLineup || [])}</div>
              <div class="team-formation"><div style="text-align:center;"><span class="formation-badge">${escapeHtml(match.awayTeam)} — ${escapeHtml(match.awayFormation||'4-4-2')}</span></div>${renderPitchLineup(match.awayLineup || [])}</div>
            </div>
            <div id="stats-${idx}" class="tab-content">${renderStats(match)}</div>
          </div>
        `;
      }).join('');
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const parent = btn.closest('.match-card');
          const tabId = btn.dataset.tab;
          const content = document.getElementById(tabId);
          const isActive = content.classList.contains('active');
          parent.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
          parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          if (!isActive) {
            content.classList.add('active');
            btn.classList.add('active');
          }
        });
      });
    }
    
    onValue(matchesRef, (snapshot) => renderMatches(snapshot.val()));
  </script>
</body>
</html>
