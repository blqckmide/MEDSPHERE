<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Student Union Cup 2026 | Live Scores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <h1>⚡ STUDENT UNION CUP <span>2026</span></h1>
      <p>Live Scores • Match Tracker • Real-time Updates</p>
    </div>
  </div>

  <main>
    <div class="matches-container" id="matchesList">
      <div class="no-matches">Loading matches...</div>
    </div>
  </main>

  <footer>
    <p>Powered by <strong>MEDSPHERE</strong> | Student Union Cup 2026</p>
  </footer>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8Lgw7WzFuCBw5OaYTQebQ8I4JgjuohFU",
      authDomain: "medsphere-c794d.firebaseapp.com",
      projectId: "medsphere-c794d",
      storageBucket: "medsphere-c794d.firebasestorage.app",
      messagingSenderId: "962864542783",
      appId: "1:962864542783:web:b59e6abda9c6f1a9fc348a",
      measurementId: "G-HPQ46648M4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchesRef = ref(db, 'matches');

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function renderMatches(matches) {
      const container = document.getElementById('matchesList');
      if (!matches || Object.keys(matches).length === 0) {
        container.innerHTML = '<div class="no-matches"><p>📢 No matches scheduled yet.<br>Check back later or contact admin.</p></div>';
        return;
      }

      const matchesArray = Object.values(matches);
      container.innerHTML = matchesArray.map(match => `
        <div class="match-card">
          <div class="status-bar">
            <span class="match-status">${escapeHtml(match.matchStatus || 'Not started')}</span>
            <span class="match-time">${escapeHtml(match.matchTime || '')}</span>
          </div>
          <div class="score-section">
            <div class="team-block">
              <div class="team-name">${escapeHtml(match.homeTeam)}</div>
              <div class="team-score">${match.homeScore || 0}</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="team-block">
              <div class="team-name">${escapeHtml(match.awayTeam)}</div>
              <div class="team-score">${match.awayScore || 0}</div>
            </div>
          </div>
          <div class="details-panel">
            <div class="details-grid">
              <div class="detail-card">
                <h4>⚽ GOALS</h4>
                <ul class="detail-list">
                  ${(match.scorers || []).map(s => `<li><span class="goal-marker">⚽</span> ${escapeHtml(s.name)} <span style="color:#64748b;">${s.time}</span></li>`).join('') || '<li class="empty-state">— No goals —</li>'}
                </ul>
              </div>
              <div class="detail-card">
                <h4>🟨 YELLOW</h4>
                <ul class="detail-list">
                  ${(match.yellowCards || []).map(c => `<li><span class="yellow-marker">🟨</span> ${escapeHtml(c.player)} <span style="color:#64748b;">${c.time}</span></li>`).join('') || '<li class="empty-state">— None —</li>'}
                </ul>
              </div>
              <div class="detail-card">
                <h4>🟥 RED</h4>
                <ul class="detail-list">
                  ${(match.redCards || []).map(c => `<li><span class="red-marker">🟥</span> ${escapeHtml(c.player)} <span style="color:#64748b;">${c.time}</span></li>`).join('') || '<li class="empty-state">— None —</li>'}
                </ul>
              </div>
              <div class="detail-card">
                <h4>📋 EVENTS</h4>
                <ul class="detail-list">
                  ${(match.events || []).map(e => `<li><span class="event-marker">📌</span> ${escapeHtml(e)}</li>`).join('') || '<li class="empty-state">— No events —</li>'}
                </ul>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Listen for real-time updates from Firebase
    onValue(matchesRef, (snapshot) => {
      const data = snapshot.val();
      renderMatches(data);
    });
  </script>
</body>
</html>
