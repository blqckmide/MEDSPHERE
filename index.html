<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MEDSPHERE Live Score | Student Union Cup 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f8f9fc 0%, #eef2f8 100%);
      color: #1f2937;
      line-height: 1.4;
    }
    .hero {
      background: linear-gradient(135deg, #b91c1c 0%, #7f1a1a 50%, #4c0f0f 100%);
      padding: 2rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(45deg, rgba(255,215,0,0.08) 0px, rgba(255,215,0,0.08) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
    }
    .hero h1 { font-size: 2rem; font-weight: 800; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.2); position: relative; z-index: 2; }
    .hero h1 span { font-weight: 500; opacity: 0.9; }
    .tournament-badge {
      display: inline-block;
      background: rgba(255,215,0,0.2);
      backdrop-filter: blur(4px);
      padding: 6px 20px;
      border-radius: 60px;
      margin-top: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #ffdf7e;
      border: 1px solid rgba(255,215,0,0.4);
      position: relative;
      z-index: 2;
    }
    .matches-container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1.8rem; }
    .match-card {
      background: white;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      border: 1px solid rgba(185, 28, 28, 0.15);
    }
    .match-card:hover { transform: translateY(-4px); box-shadow: 0 20px 32px rgba(0, 0, 0, 0.12); }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.5rem;
      background: #fffbf5;
      border-bottom: 2px solid #f0e6d8;
    }
    .period {
      background: linear-gradient(135deg, #b91c1c, #7f1a1a);
      color: white;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .status {
      background: #eef2f8;
      color: #2c3e50;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2rem;
      gap: 1.5rem;
      background: white;
    }
    .team { flex: 1; text-align: center; }
    .team-name { font-weight: 800; font-size: 1.2rem; margin-bottom: 8px; color: #1f2937; }
    .team-score { font-size: 2.2rem; font-weight: 800; color: #b91c1c; text-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .vs-divider {
      background: #f0e6d8;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: 800;
      font-size: 0.9rem;
      color: #b91c1c;
    }
    .motm {
      text-align: center;
      background: linear-gradient(135deg, #fef9e6, #fff4e0);
      margin: 0 1.5rem 1rem;
      padding: 8px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #b45309;
      border: 1px solid #ffdf7e;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #eef2f8;
      margin: 0 1.5rem 1.5rem;
      border-radius: 24px;
      overflow: hidden;
    }
    .stat-card {
      background: white;
      padding: 1rem 0.8rem;
      text-align: center;
    }
    .stat-card h4 {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #b91c1c;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .stat-list { list-style: none; font-size: 0.75rem; }
    .stat-list li { padding: 5px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .goal-marker { color: #16a34a; font-weight: 700; }
    .yellow-marker { color: #eab308; font-weight: 700; }
    .red-marker { color: #dc2626; font-weight: 700; }
    .empty-stats { color: #9aaebf; font-style: italic; }

    /* Pitch Line-up */
    .lineup-section { padding: 0 1.5rem 1.5rem; }
    .lineup-toggle {
      background: linear-gradient(135deg, #b91c1c, #7f1a1a);
      border: none;
      width: 100%;
      padding: 12px;
      font-size: 0.85rem;
      font-weight: 700;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .lineup-toggle:hover { transform: scale(1.01); background: linear-gradient(135deg, #a00c26, #6e0e22); }
    .lineup-container { display: none; margin-top: 12px; }
    .lineup-container.show { display: block; }
    .pitch {
      background: linear-gradient(145deg, #1b5e3a 0%, #0f4a2c 100%);
      border-radius: 32px;
      padding: 1.2rem;
      position: relative;
      border: 3px solid #ffdf7e;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      margin-bottom: 1.5rem;
    }
    .pitch-title {
      text-align: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: #ffdf7e;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .pitch-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .pitch-player {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      color: white;
      padding: 8px 14px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 500;
      min-width: 85px;
      text-align: center;
      border: 1px solid #ffdf7e;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .pitch-player::before {
      content: "👕";
      font-size: 0.75rem;
    }
    .pitch-player-num {
      font-weight: 800;
      color: #ffdf7e;
      margin-right: 4px;
    }
    .pitch-zone {
      text-align: center;
      font-size: 0.65rem;
      color: #c8e6b5;
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.7rem;
      color: #6c7a8e;
      border-top: 1px solid #eef2f8;
      margin-top: 2rem;
      background: white;
    }
    footer strong { color: #b91c1c; }
    @media (max-width: 700px) {
      .hero h1 { font-size: 1.4rem; }
      .team-score { font-size: 1.6rem; }
      .team-name { font-size: 0.9rem; }
      .pitch-player { font-size: 0.65rem; min-width: 65px; padding: 5px 10px; }
      .pitch-row { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>⚡ MEDSPHERE <span>LIVE SCORE</span></h1>
    <div class="tournament-badge">🏆 STUDENT UNION CUP 2026</div>
  </div>
  <main>
    <div class="matches-container" id="matchesList">
      <div class="no-matches" style="text-align:center; padding:2rem;">📢 Loading matches...</div>
    </div>
  </main>
  <footer>
    <p>Powered by <strong>MEDSPHERE</strong> | Real‑time updates</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8Lgw7WzFuCBw5OaYTQebQ8I4JgjuohFU",
      authDomain: "medsphere-c794d.firebaseapp.com",
      projectId: "medsphere-c794d",
      storageBucket: "medsphere-c794d.firebasestorage.app",
      messagingSenderId: "962864542783",
      appId: "1:962864542783:web:b59e6abda9c6f1a9fc348a",
      measurementId: "G-HPQ46648M4"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchesRef = ref(db, 'matches');

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    function groupByZone(players) {
      const zones = {
        GK: { label: 'GOALKEEPER', players: [] },
        DEF: { label: 'DEFENDERS', players: [] },
        MID: { label: 'MIDFIELDERS', players: [] },
        FW: { label: 'FORWARDS', players: [] }
      };
      players.forEach(p => {
        const pos = p.position || 'SUB';
        if (['GK'].includes(pos)) zones.GK.players.push(p);
        else if (['LB','CB','RB','LWB','RWB'].includes(pos)) zones.DEF.players.push(p);
        else if (['DMF','CMF','AMF','LMF','RMF'].includes(pos)) zones.MID.players.push(p);
        else if (['LWF','RWF','SS','CF'].includes(pos)) zones.FW.players.push(p);
        else zones.MID.players.push(p);
      });
      return zones;
    }

    function renderPitch(players, teamName) {
      if (!players || players.length === 0) return '<div class="pitch" style="padding:1rem; text-align:center;">No line-up added</div>';
      const zones = groupByZone(players);
      return `
        <div class="pitch">
          <div class="pitch-title">${escapeHtml(teamName)} — TACTICAL FORMATION</div>
          ${zones.GK.players.length ? `<div class="pitch-zone">🧤 GOALKEEPER</div><div class="pitch-row">${zones.GK.players.map(p => `<div class="pitch-player"><span class="pitch-player-num">${p.number}</span> ${escapeHtml(p.name)}</div>`).join('')}</div>` : ''}
          ${zones.DEF.players.length ? `<div class="pitch-zone">🛡️ DEFENCE</div><div class="pitch-row">${zones.DEF.players.map(p => `<div class="pitch-player"><span class="pitch-player-num">${p.number}</span> ${escapeHtml(p.name)}</div>`).join('')}</div>` : ''}
          ${zones.MID.players.length ? `<div class="pitch-zone">⚡ MIDFIELD</div><div class="pitch-row">${zones.MID.players.map(p => `<div class="pitch-player"><span class="pitch-player-num">${p.number}</span> ${escapeHtml(p.name)}</div>`).join('')}</div>` : ''}
          ${zones.FW.players.length ? `<div class="pitch-zone">🔥 ATTACK</div><div class="pitch-row">${zones.FW.players.map(p => `<div class="pitch-player"><span class="pitch-player-num">${p.number}</span> ${escapeHtml(p.name)}</div>`).join('')}</div>` : ''}
        </div>
      `;
    }

    function renderMatches(matches) {
      const container = document.getElementById('matchesList');
      if (!matches || Object.keys(matches).length === 0) {
        container.innerHTML = '<div class="no-matches" style="text-align:center; padding:2rem;">🏟️ No matches scheduled yet.</div>';
        return;
      }
      const matchesArray = Object.values(matches);
      container.innerHTML = matchesArray.map((match, idx) => {
        const motmHtml = match.manOfTheMatch ? `<div class="motm">⭐ MAN OF THE MATCH: ${escapeHtml(match.manOfTheMatch)}</div>` : '';
        const homeLineup = match.homeLineup || [];
        const awayLineup = match.awayLineup || [];
        return `
          <div class="match-card">
            <div class="status-bar"><span class="period">${escapeHtml(match.period || 'First half')}</span><span class="status">${escapeHtml(match.status || 'Not started')}</span></div>
            <div class="score-row">
              <div class="team"><div class="team-name">${escapeHtml(match.homeTeam)}</div><div class="team-score">${match.homeScore || 0}</div></div>
              <div class="vs-divider">VS</div>
              <div class="team"><div class="team-name">${escapeHtml(match.awayTeam)}</div><div class="team-score">${match.awayScore || 0}</div></div>
            </div>
            ${motmHtml}
            <div class="stats-grid">
              <div class="stat-card"><h4>⚽ GOALS</h4><ul class="stat-list">${(match.scorers || []).map(s => `<li><span class="goal-marker">⚽</span> ${escapeHtml(s.name)} ${s.time}</li>`).join('') || '<li class="empty-stats">— No goals —</li>'}</ul></div>
              <div class="stat-card"><h4>🟨 BOOKINGS</h4><ul class="stat-list">${(match.yellowCards || []).map(c => `<li><span class="yellow-marker">🟨</span> ${escapeHtml(c.player)} ${c.time}</li>`).join('')}${(match.redCards || []).map(c => `<li><span class="red-marker">🟥</span> ${escapeHtml(c.player)} ${c.time}</li>`).join('') || '<li class="empty-stats">— No bookings —</li>'}</ul></div>
            </div>
            <div class="lineup-section">
              <button class="lineup-toggle" onclick="this.nextElementSibling.classList.toggle('show')">📋 VIEW LINE-UPS (PITCH)</button>
              <div class="lineup-container">
                <div style="margin-bottom: 20px;">${renderPitch(homeLineup, match.homeTeam)}</div>
                <div>${renderPitch(awayLineup, match.awayTeam)}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    onValue(matchesRef, (snapshot) => renderMatches(snapshot.val()));
  </script>
</body>
</html>
