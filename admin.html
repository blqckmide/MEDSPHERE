<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Student Union Cup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #f5f7fc 0%, #edf2f9 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    .admin-container {
      max-width: 750px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      padding: 1.8rem;
      margin-bottom: 2rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(200, 16, 46, 0.15);
      transition: all 0.2s;
    }
    .card:hover {
      border-color: rgba(200, 16, 46, 0.3);
      box-shadow: 0 20px 32px rgba(0, 0, 0, 0.08);
    }
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #c8102e;
      margin-bottom: 1.2rem;
      border-left: 5px solid #c8102e;
      padding-left: 14px;
      letter-spacing: -0.3px;
    }
    h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin: 1.2rem 0 0.8rem;
      color: #1e293b;
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-row {
      margin-bottom: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #5f6c84;
    }
    input, select {
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #ffffff;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #c8102e;
      box-shadow: 0 0 0 3px rgba(200, 16, 46, 0.1);
    }
    button {
      background: #c8102e;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
      letter-spacing: 0.3px;
    }
    button:hover {
      background: #a00c26;
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(200, 16, 46, 0.2);
    }
    .btn-secondary {
      background: #334155;
    }
    .btn-secondary:hover {
      background: #1e293b;
    }
    .match-preview {
      background: #fefefe;
      border-radius: 24px;
      padding: 1.2rem;
      margin-top: 1rem;
      border: 1px solid #eef2f8;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .match-preview h4 {
      margin-bottom: 1rem;
      color: #c8102e;
      font-weight: 700;
      font-size: 1.1rem;
    }
    hr {
      margin: 1rem 0;
      border: none;
      border-top: 1px solid #ecf3fa;
    }
    .form-row-inline {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .form-row-inline input {
      flex: 1;
    }
    @media (max-width: 550px) {
      .card { padding: 1.2rem; }
      h2 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="admin-container">
  <div class="card">
    <h2>➕ CREATE MATCH</h2>
    <div class="form-row">
      <label>Home Team</label>
      <input type="text" id="newHomeTeam" placeholder="Home team name">
    </div>
    <div class="form-row">
      <label>Away Team</label>
      <input type="text" id="newAwayTeam" placeholder="Away team name">
    </div>
    <button onclick="createMatch()">Create Match</button>
  </div>

  <div class="card">
    <h2>✏️ EDIT MATCH</h2>
    <div class="form-row">
      <label>Select Match</label>
      <select id="matchSelect">
        <option value="">Loading matches...</option>
      </select>
    </div>
    <div id="editArea"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB8Lgw7WzFuCBw5OaYTQebQ8I4JgjuohFU",
    authDomain: "medsphere-c794d.firebaseapp.com",
    projectId: "medsphere-c794d",
    storageBucket: "medsphere-c794d.firebasestorage.app",
    messagingSenderId: "962864542783",
    appId: "1:962864542783:web:b59e6abda9c6f1a9fc348a",
    measurementId: "G-HPQ46648M4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const matchesRef = ref(db, 'matches');

  let matches = {};
  let currentMatchId = null;

  onValue(matchesRef, (snapshot) => {
    matches = snapshot.val() || {};
    const select = document.getElementById('matchSelect');
    const options = Object.keys(matches).map(key => `<option value="${key}">${matches[key].homeTeam} vs ${matches[key].awayTeam}</option>`).join('');
    select.innerHTML = options || '<option value="">No matches yet. Create one.</option>';
    if (options && !currentMatchId) {
      select.value = Object.keys(matches)[0];
      loadMatchToEdit(Object.keys(matches)[0]);
    } else if (currentMatchId && matches[currentMatchId]) {
      select.value = currentMatchId;
      loadMatchToEdit(currentMatchId);
    } else if (Object.keys(matches).length === 0) {
      document.getElementById('editArea').innerHTML = '<p style="color:#9aaebf; margin-top:1rem; text-align:center;">✨ No matches yet. Create your first match above.</p>';
    }
  });

  function loadMatchToEdit(matchId) {
    currentMatchId = matchId;
    const match = matches[matchId];
    if (!match) return;
    document.getElementById('editArea').innerHTML = `
      <div class="match-preview">
        <h4>⚽ ${escapeHtml(match.homeTeam)} vs ${escapeHtml(match.awayTeam)}</h4>
        
        <div class="form-row">
          <label>Match Status</label>
          <select id="editStatus">
            <option ${match.matchStatus === 'Not started' ? 'selected' : ''}>Not started</option>
            <option ${match.matchStatus === 'First half' ? 'selected' : ''}>First half</option>
            <option ${match.matchStatus === 'Half time' ? 'selected' : ''}>Half time</option>
            <option ${match.matchStatus === 'Second half' ? 'selected' : ''}>Second half</option>
            <option ${match.matchStatus === 'Full time' ? 'selected' : ''}>Full time</option>
          </select>
        </div>

        <div class="form-row">
          <label>Match Time</label>
          <select id="editTime">
            <option ${match.matchTime === 'Not started' ? 'selected' : ''}>Not started</option>
            <option ${match.matchTime === 'First half' ? 'selected' : ''}>First half</option>
            <option ${match.matchTime === 'Half time' ? 'selected' : ''}>Half time</option>
            <option ${match.matchTime === 'Second half' ? 'selected' : ''}>Second half</option>
            <option ${match.matchTime === 'Full time' ? 'selected' : ''}>Full time</option>
          </select>
        </div>

        <div class="form-row-inline">
          <div class="form-row" style="flex:1">
            <label>🏠 ${match.homeTeam}</label>
            <input type="number" id="editHomeScore" value="${match.homeScore || 0}">
          </div>
          <div class="form-row" style="flex:1">
            <label>✈️ ${match.awayTeam}</label>
            <input type="number" id="editAwayScore" value="${match.awayScore || 0}">
          </div>
        </div>
        <button onclick="updateScores()">Update Score</button>

        <hr>

        <h3>⚽ ADD GOAL SCORER</h3>
        <div class="form-row-inline">
          <input type="text" id="scorerName" placeholder="Player name">
          <input type="text" id="scorerTime" placeholder="Minute">
        </div>
        <button onclick="addScorer()">Add Goal</button>

        <h3>🟨 ADD YELLOW CARD</h3>
        <div class="form-row-inline">
          <input type="text" id="yellowPlayer" placeholder="Player name">
          <input type="text" id="yellowTime" placeholder="Minute">
        </div>
        <button onclick="addYellowCard()">Add Yellow Card</button>

        <h3>🟥 ADD RED CARD</h3>
        <div class="form-row-inline">
          <input type="text" id="redPlayer" placeholder="Player name">
          <input type="text" id="redTime" placeholder="Minute">
        </div>
        <button onclick="addRedCard()">Add Red Card</button>

        <h3>📋 ADD EVENT</h3>
        <input type="text" id="eventText" placeholder="Match event">
        <button onclick="addEvent()" style="margin-top: 8px;">Add Event</button>

        <button class="btn-secondary" onclick="resetMatch()" style="margin-top: 20px;">🗑️ Reset Match</button>
      </div>
    `;
  }

  window.updateScores = async () => {
    const match = matches[currentMatchId];
    if (!match) return;
    const newStatus = document.getElementById('editStatus').value;
    const newTime = document.getElementById('editTime').value;
    const homeScore = parseInt(document.getElementById('editHomeScore').value);
    const awayScore = parseInt(document.getElementById('editAwayScore').value);
    await update(ref(db, `matches/${currentMatchId}`), {
      matchStatus: newStatus,
      matchTime: newTime,
      homeScore: homeScore,
      awayScore: awayScore
    });
    alert('Score updated');
  };

  window.addScorer = async () => {
    const name = document.getElementById('scorerName').value.trim();
    const minute = document.getElementById('scorerTime').value.trim();
    if (!name || !minute) return alert('Enter player name and minute');
    const scorers = [...(matches[currentMatchId].scorers || [])];
    scorers.push({ name, time: minute });
    await update(ref(db, `matches/${currentMatchId}`), { scorers });
    document.getElementById('scorerName').value = '';
    document.getElementById('scorerTime').value = '';
    alert('Goal added');
  };

  window.addYellowCard = async () => {
    const player = document.getElementById('yellowPlayer').value.trim();
    const minute = document.getElementById('yellowTime').value.trim();
    if (!player || !minute) return alert('Enter player name and minute');
    const yellowCards = [...(matches[currentMatchId].yellowCards || [])];
    yellowCards.push({ player, time: minute });
    await update(ref(db, `matches/${currentMatchId}`), { yellowCards });
    document.getElementById('yellowPlayer').value = '';
    document.getElementById('yellowTime').value = '';
    alert('Yellow card added');
  };

  window.addRedCard = async () => {
    const player = document.getElementById('redPlayer').value.trim();
    const minute = document.getElementById('redTime').value.trim();
    if (!player || !minute) return alert('Enter player name and minute');
    const redCards = [...(matches[currentMatchId].redCards || [])];
    redCards.push({ player, time: minute });
    await update(ref(db, `matches/${currentMatchId}`), { redCards });
    document.getElementById('redPlayer').value = '';
    document.getElementById('redTime').value = '';
    alert('Red card added');
  };

  window.addEvent = async () => {
    const text = document.getElementById('eventText').value.trim();
    if (!text) return alert('Enter event details');
    const events = [...(matches[currentMatchId].events || [])];
    events.push(text);
    await update(ref(db, `matches/${currentMatchId}`), { events });
    document.getElementById('eventText').value = '';
    alert('Event added');
  };

  window.resetMatch = async () => {
    if (!confirm('Reset all match data?')) return;
    await update(ref(db, `matches/${currentMatchId}`), {
      homeScore: 0,
      awayScore: 0,
      scorers: [],
      yellowCards: [],
      redCards: [],
      events: [],
      matchStatus: 'Not started',
      matchTime: 'Not started'
    });
    alert('Match reset');
  };

  window.createMatch = async () => {
    const home = document.getElementById('newHomeTeam').value.trim();
    const away = document.getElementById('newAwayTeam').value.trim();
    if (!home || !away) return alert('Enter both team names');
    const newMatchRef = push(ref(db, 'matches'));
    await set(newMatchRef, {
      homeTeam: home,
      awayTeam: away,
      homeScore: 0,
      awayScore: 0,
      scorers: [],
      yellowCards: [],
      redCards: [],
      events: [],
      matchStatus: 'Not started',
      matchTime: 'Not started'
    });
    document.getElementById('newHomeTeam').value = '';
    document.getElementById('newAwayTeam').value = '';
    alert('Match created');
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
</script>
</body>
</html>
