<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Student Union Cup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fc;
      padding: 2rem 1rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 28px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid #eef2f8;
    }
    h2 { font-size: 1.3rem; color: #b91c1c; margin-bottom: 1rem; border-left: 4px solid #b91c1c; padding-left: 12px; }
    h3 { font-size: 0.9rem; font-weight: 700; margin: 1rem 0 0.5rem; color: #1f2937; }
    label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #5a6874; display: block; margin-bottom: 4px; }
    input, select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dce3ec;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }
    button {
      background: #b91c1c;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { background: #7f1a1a; transform: translateY(-1px); }
    .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .flex > div { flex: 1; }
    .match-badge {
      background: #fef9e6;
      padding: 12px;
      border-radius: 20px;
      text-align: center;
      font-weight: 700;
      margin-bottom: 16px;
      color: #b91c1c;
      border: 1px solid #ffdf7e;
    }
    hr { margin: 16px 0; border-top: 1px solid #ecf3fa; }
    .player-item {
      background: #f8fafc;
      padding: 6px 12px;
      border-radius: 30px;
      display: inline-block;
      margin: 4px;
      font-size: 0.75rem;
      border: 1px solid #e2e8f0;
    }
    .player-list-area {
      background: #fafcff;
      border-radius: 20px;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #eef2f8;
      min-height: 80px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card"><h2>➕ CREATE MATCH</h2><div class="flex"><input type="text" id="newHomeTeam" placeholder="Home team"><input type="text" id="newAwayTeam" placeholder="Away team"><button onclick="createMatch()">Create</button></div></div>
  <div class="card"><h2>✏️ EDIT MATCH</h2><label>Select Match</label><select id="matchSelect"></select><div id="matchEditor"></div></div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyB8Lgw7WzFuCBw5OaYTQebQ8I4JgjuohFU",
    authDomain: "medsphere-c794d.firebaseapp.com",
    projectId: "medsphere-c794d",
    storageBucket: "medsphere-c794d.firebasestorage.app",
    messagingSenderId: "962864542783",
    appId: "1:962864542783:web:b59e6abda9c6f1a9fc348a",
    measurementId: "G-HPQ46648M4"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const matchesRef = ref(db, 'matches');
  let matches = {}, currentMatchId = null;
  const positions = ['GK','LB','CB','RB','LWB','RWB','DMF','CMF','AMF','LMF','RMF','LWF','RWF','SS','CF'];

  onValue(matchesRef, (snapshot) => {
    matches = snapshot.val() || {};
    const select = document.getElementById('matchSelect');
    const matchIds = Object.keys(matches);
    select.innerHTML = matchIds.map(id => `<option value="${id}">${matches[id].homeTeam} vs ${matches[id].awayTeam}</option>`).join('') || '<option>No matches</option>';
    if (matchIds.length && (!currentMatchId || !matches[currentMatchId])) { currentMatchId = matchIds[0]; select.value = currentMatchId; loadEditor(currentMatchId); }
    else if (currentMatchId && matches[currentMatchId]) { select.value = currentMatchId; loadEditor(currentMatchId); }
  });

  function loadEditor(matchId) {
    currentMatchId = matchId;
    const m = matches[matchId];
    if (!m) return;
    const homeLineup = (m.homeLineup || []).filter(p => p && p.name);
    const awayLineup = (m.awayLineup || []).filter(p => p && p.name);
    const allPlayers = [...homeLineup, ...awayLineup];
    document.getElementById('matchEditor').innerHTML = `
      <div class="match-badge">⚽ ${escapeHtml(m.homeTeam)} vs ${escapeHtml(m.awayTeam)}</div>
      <div class="flex"><div><label>Match Time</label><input type="text" id="editTime" placeholder="e.g., 45', HT, FT" value="${escapeHtml(m.time||'')}"></div>
      <div><label>Status</label><select id="editStatus"><option ${m.status==='NOT STARTED'?'selected':''}>NOT STARTED</option><option ${m.status==='LIVE'?'selected':''}>LIVE</option><option ${m.status==='ENDED'?'selected':''}>ENDED</option></select></div>
      <div><label>Period (HT only)</label><select id="editPeriod"><option ${m.period==='First half'?'selected':''}>First half</option><option ${m.period==='Half time'?'selected':''}>Half time</option><option ${m.period==='Second half'?'selected':''}>Second half</option><option ${m.period==='Full time'?'selected':''}>Full time</option></select></div></div>
      <div class="flex"><div><label>🏠 ${escapeHtml(m.homeTeam)} Score</label><input type="number" id="editHomeScore" value="${m.homeScore||0}"></div><div><label>✈️ ${escapeHtml(m.awayTeam)} Score</label><input type="number" id="editAwayScore" value="${m.awayScore||0}"></div><button onclick="updateMatch()">Update</button></div>
      <hr><h3>⭐ MAN OF THE MATCH</h3><select id="motmSelect"><option value="">— Select player —</option>${allPlayers.map(p => `<option value="${escapeHtml(p.name)}" ${m.manOfTheMatch===p.name?'selected':''}>${p.number}. ${escapeHtml(p.name)} (${p.position})</option>`).join('')}</select><button onclick="setMotm()">Set MOTM</button>
      <hr><div class="flex"><div><h3>⚽ ADD GOAL</h3><input type="text" id="scorerName" placeholder="Player name"><input type="text" id="scorerTime" placeholder="Minute"><button onclick="addGoal()">Add</button></div></div>
      <div class="flex"><div><h3>🟨 YELLOW CARD</h3><input type="text" id="yellowPlayer" placeholder="Player name"><input type="text" id="yellowTime" placeholder="Minute"><button onclick="addYellow()">Add</button></div></div>
      <div class="flex"><div><h3>🟥 RED CARD</h3><input type="text" id="redPlayer" placeholder="Player name"><input type="text" id="redTime" placeholder="Minute"><button onclick="addRed()">Add</button></div></div>
      <hr><h3>📋 LINE-UPS</h3>
      <div class="flex"><div><h4>${escapeHtml(m.homeTeam)}</h4><div class="player-list-area" id="homeLineupList">${homeLineup.map(p => `<div class="player-item">${p.number}. ${escapeHtml(p.name)} (${p.position}) <button onclick="removePlayer('home','${escapeHtml(p.name)}')" style="background:none; color:#b91c1c;">✖</button></div>`).join('') || '<span>No players</span>'}</div><div class="flex"><input type="number" id="homePlayerNum" placeholder="#" style="width:70px"><input type="text" id="homePlayerName" placeholder="Name"><select id="homePlayerPos">${positions.map(pos => `<option>${pos}</option>`).join('')}</select><button onclick="addPlayer('home')">Add</button></div></div>
      <div><h4>${escapeHtml(m.awayTeam)}</h4><div class="player-list-area" id="awayLineupList">${awayLineup.map(p => `<div class="player-item">${p.number}. ${escapeHtml(p.name)} (${p.position}) <button onclick="removePlayer('away','${escapeHtml(p.name)}')" style="background:none; color:#b91c1c;">✖</button></div>`).join('') || '<span>No players</span>'}</div><div class="flex"><input type="number" id="awayPlayerNum" placeholder="#" style="width:70px"><input type="text" id="awayPlayerName" placeholder="Name"><select id="awayPlayerPos">${positions.map(pos => `<option>${pos}</option>`).join('')}</select><button onclick="addPlayer('away')">Add</button></div></div></div>
      <hr><div><strong>⚽ GOALS:</strong> ${(m.scorers || []).map(s => `<span class="player-item">${escapeHtml(s.name)} ${s.time}</span>`).join('') || '—'}</div>
      <div><strong>🟨 YELLOW:</strong> ${(m.yellowCards || []).map(c => `<span class="player-item">${escapeHtml(c.player)} ${c.time}</span>`).join('') || '—'}</div>
      <div><strong>🟥 RED:</strong> ${(m.redCards || []).map(c => `<span class="player-item">${escapeHtml(c.player)} ${c.time}</span>`).join('') || '—'}</div>
      <button class="delete-btn" onclick="deleteMatch()" style="margin-top:20px; background:#6c757d;">🗑️ Delete Match</button>
    `;
  }

  window.updateMatch = async () => {
    const time = document.getElementById('editTime').value;
    const status = document.getElementById('editStatus').value;
    const period = document.getElementById('editPeriod').value;
    const homeScore = parseInt(document.getElementById('editHomeScore').value);
    const awayScore = parseInt(document.getElementById('editAwayScore').value);
    await update(ref(db, `matches/${currentMatchId}`), { time, status, period, homeScore, awayScore });
    alert('Updated');
  };
  window.setMotm = async () => { const motm = document.getElementById('motmSelect').value; await update(ref(db, `matches/${currentMatchId}`), { manOfTheMatch: motm || null }); alert('MOTM set'); };
  window.addGoal = async () => { const name = document.getElementById('scorerName').value.trim(), minute = document.getElementById('scorerTime').value.trim(); if(!name||!minute) return alert('Enter player and minute'); const scorers = [...(matches[currentMatchId].scorers||[])]; scorers.push({name, time: minute}); await update(ref(db, `matches/${currentMatchId}`), { scorers }); document.getElementById('scorerName').value=''; document.getElementById('scorerTime').value=''; alert('Goal added'); };
  window.addYellow = async () => { const player = document.getElementById('yellowPlayer').value.trim(), minute = document.getElementById('yellowTime').value.trim(); if(!player||!minute) return alert('Enter player and minute'); const cards = [...(matches[currentMatchId].yellowCards||[])]; cards.push({player, time: minute}); await update(ref(db, `matches/${currentMatchId}`), { yellowCards: cards }); document.getElementById('yellowPlayer').value=''; document.getElementById('yellowTime').value=''; alert('Yellow added'); };
  window.addRed = async () => { const player = document.getElementById('redPlayer').value.trim(), minute = document.getElementById('redTime').value.trim(); if(!player||!minute) return alert('Enter player and minute'); const cards = [...(matches[currentMatchId].redCards||[])]; cards.push({player, time: minute}); await update(ref(db, `matches/${currentMatchId}`), { redCards: cards }); document.getElementById('redPlayer').value=''; document.getElementById('redTime').value=''; alert('Red added'); };
  window.addPlayer = async (team) => { const num = document.getElementById(`${team}PlayerNum`).value.trim(), name = document.getElementById(`${team}PlayerName`).value.trim(), pos = document.getElementById(`${team}PlayerPos`).value; if(!num||!name) return alert('Enter number and name'); const lineupKey = team==='home'?'homeLineup':'awayLineup'; const current = [...(matches[currentMatchId][lineupKey]||[])]; current.push({number:num, name, position:pos}); await update(ref(db, `matches/${currentMatchId}`), { [lineupKey]: current }); document.getElementById(`${team}PlayerNum`).value=''; document.getElementById(`${team}PlayerName`).value=''; loadEditor(currentMatchId); };
  window.removePlayer = async (team, playerName) => { const lineupKey = team==='home'?'homeLineup':'awayLineup'; const current = [...(matches[currentMatchId][lineupKey]||[])]; const updated = current.filter(p=>p.name!==playerName); await update(ref(db, `matches/${currentMatchId}`), { [lineupKey]: updated }); loadEditor(currentMatchId); };
  window.deleteMatch = async () => { if(!confirm('Delete match?')) return; await remove(ref(db, `matches/${currentMatchId}`)); alert('Deleted'); };
  window.createMatch = async () => { const home = document.getElementById('newHomeTeam').value.trim(), away = document.getElementById('newAwayTeam').value.trim(); if(!home||!away) return alert('Enter both teams'); const newMatchRef = push(ref(db, 'matches')); await set(newMatchRef, { homeTeam: home, awayTeam: away, homeScore:0, awayScore:0, scorers:[], yellowCards:[], redCards:[], homeLineup:[], awayLineup:[], period:'First half', status:'NOT STARTED', time:'--' }); document.getElementById('newHomeTeam').value=''; document.getElementById('newAwayTeam').value=''; alert('Match created'); };
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;': m==='>'?'&gt;': m); }
  document.getElementById('matchSelect').addEventListener('change', (e)=> { if(e.target.value) loadEditor(e.target.value); });
</script>
</body>
</html>
