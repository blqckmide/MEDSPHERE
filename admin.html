<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Student Union Cup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fc; padding: 2rem 1rem; }
    .container { max-width: 900px; margin: 0 auto; }
    .card { background: white; border-radius: 28px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #eef2f8; }
    h2 { font-size: 1.2rem; color: #1a2c3e; margin-bottom: 1rem; border-left: 4px solid #2d4a6e; padding-left: 12px; }
    h3 { font-size: 0.85rem; margin: 1rem 0 0.5rem; color: #1f2937; font-weight: 700; }
    label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #5a6874; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 12px; border: 1px solid #dce3ec; border-radius: 20px; font-size: 0.85rem; margin-bottom: 10px; }
    button { background: #2d4a6e; color: white; border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: 0.2s; }
    button:hover { background: #1e3a5f; transform: translateY(-1px); }
    .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .flex > div { flex: 1; }
    .match-badge { background: #f0f4f9; padding: 12px; border-radius: 20px; text-align: center; font-weight: 700; margin-bottom: 16px; color: #1a2c3e; }
    hr { margin: 16px 0; border-top: 1px solid #ecf3fa; }
    .player-item { background: #f8fafc; padding: 6px 12px; border-radius: 30px; display: inline-block; margin: 4px; font-size: 0.75rem; border: 1px solid #e2e8f0; }
    .player-list-area { background: #fafcff; border-radius: 20px; padding: 12px; margin-top: 8px; border: 1px solid #eef2f8; min-height: 80px; }
    .section-title { background: #eef2f8; padding: 8px 12px; border-radius: 12px; margin: 16px 0 12px; font-weight: 700; font-size: 0.8rem; color: #1a2c3e; }
  </style>
</head>
<body>
<div class="container">
  <div class="card"><h2>➕ CREATE MATCH</h2><div class="flex"><input type="text" id="newHomeTeam" placeholder="Home team"><input type="text" id="newAwayTeam" placeholder="Away team"><button onclick="createMatch()">Create</button></div></div>
  <div class="card"><h2>✏️ EDIT MATCH</h2><label>Select Match</label><select id="matchSelect"></select><div id="matchEditor"></div></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB8Lgw7WzFuCBw5OaYTQebQ8I4JgjuohFU",
    authDomain: "medsphere-c794d.firebaseapp.com",
    projectId: "medsphere-c794d",
    storageBucket: "medsphere-c794d.firebasestorage.app",
    messagingSenderId: "962864542783",
    appId: "1:962864542783:web:b59e6abda9c6f1a9fc348a",
    measurementId: "G-HPQ46648M4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const matchesRef = ref(db, 'matches');

  let matches = {};
  let currentMatchId = null;

  const positions = ['GK', 'LB', 'CB', 'RB', 'LWB', 'RWB', 'DMF', 'CMF', 'AMF', 'LMF', 'RMF', 'LWF', 'RWF', 'SS', 'CF'];
  const formations = ['4-4-2', '4-3-3', '3-5-2', '4-2-3-1', '5-3-2', '4-5-1', '3-4-3'];

  onValue(matchesRef, (snapshot) => {
    matches = snapshot.val() || {};
    const select = document.getElementById('matchSelect');
    const matchIds = Object.keys(matches);
    select.innerHTML = matchIds.map(id => `<option value="${id}">${matches[id].homeTeam} vs ${matches[id].awayTeam}</option>`).join('') || '<option>No matches</option>';
    if (matchIds.length && (!currentMatchId || !matches[currentMatchId])) {
      currentMatchId = matchIds[0];
      select.value = currentMatchId;
      loadEditor(currentMatchId);
    } else if (currentMatchId && matches[currentMatchId]) {
      select.value = currentMatchId;
      loadEditor(currentMatchId);
    }
  });

  function loadEditor(matchId) {
    currentMatchId = matchId;
    const m = matches[matchId];
    if (!m) return;

    const homeLineup = (m.homeLineup || []).filter(p => p && p.name);
    const awayLineup = (m.awayLineup || []).filter(p => p && p.name);
    const homeSubs = (m.homeSubs || []).filter(p => p && p.name);
    const awaySubs = (m.awaySubs || []).filter(p => p && p.name);
    const allPlayers = [...homeLineup.map(p => ({ ...p, team: 'home' })), ...awayLineup.map(p => ({ ...p, team: 'away' })), ...homeSubs.map(p => ({ ...p, team: 'home' })), ...awaySubs.map(p => ({ ...p, team: 'away' }))];
    const stats = m.stats || { possession: { home: 50, away: 50 }, totalShots: { home: 0, away: 0 }, shotsOnTarget: { home: 0, away: 0 }, bigChances: { home: 0, away: 0 }, corners: { home: 0, away: 0 }, passesPercent: { home: 0, away: 0 } };

    document.getElementById('matchEditor').innerHTML = `
      <div class="match-badge">⚽ ${escapeHtml(m.homeTeam)} vs ${escapeHtml(m.awayTeam)}</div>
      <div class="flex"><div><label>Match Time</label><input type="text" id="editTime" placeholder="e.g., 45', HT, FT" value="${escapeHtml(m.time || '')}"></div>
      <div><label>Status</label><select id="editStatus"><option ${m.status === 'LIVE' ? 'selected' : ''}>LIVE</option><option ${m.status === 'ENDED' ? 'selected' : ''}>ENDED</option><option ${m.status === 'UPCOMING' ? 'selected' : ''}>UPCOMING</option></select></div>
      <div><label>Stadium</label><input type="text" id="editStadium" placeholder="Stadium name" value="${escapeHtml(m.stadium || '')}"></div></div>
      <div class="flex"><div><label>🏠 ${escapeHtml(m.homeTeam)} Score</label><input type="number" id="editHomeScore" value="${m.homeScore || 0}"></div>
      <div><label>✈️ ${escapeHtml(m.awayTeam)} Score</label><input type="number" id="editAwayScore" value="${m.awayScore || 0}"></div><button onclick="updateMatch()">Update</button></div>
      <div class="section-title">📋 FORMATIONS</div>
      <div class="flex"><div><label>${escapeHtml(m.homeTeam)} Formation</label><select id="editHomeFormation">${formations.map(f => `<option ${m.homeFormation === f ? 'selected' : ''}>${f}</option>`).join('')}</select></div>
      <div><label>${escapeHtml(m.awayTeam)} Formation</label><select id="editAwayFormation">${formations.map(f => `<option ${m.awayFormation === f ? 'selected' : ''}>${f}</option>`).join('')}</select></div></div>
      <div class="section-title">⭐ MAN OF THE MATCH</div>
      <div class="flex"><select id="motmSelect" style="flex:1"><option value="">— Select player —</option>${allPlayers.map(p => `<option value="${escapeHtml(p.name)}" ${m.manOfTheMatch === p.name ? 'selected' : ''}>${p.number}. ${escapeHtml(p.name)} (${p.position}) - ${p.team === 'home' ? m.homeTeam : m.awayTeam}</option>`).join('')}</select><button onclick="setMotm()">Set MOTM</button></div>
  
      <div class="section-title">⚽ MATCH EVENTS</div>
<div class="flex"><div><h3>ADD GOAL</h3><input type="text" id="scorerName" placeholder="Player name"><input type="text" id="scorerTime" placeholder="Minute"><input type="text" id="scorerAssist" placeholder="Assist (optional)"><select id="scorerTeam"><option value="home">${escapeHtml(m.homeTeam)}</option><option value="away">${escapeHtml(m.awayTeam)}</option></select><button onclick="addGoal()">Add Goal</button></div></div>
      <hr><div><strong>⚽ GOALS:</strong> ${(m.scorers || []).map(s => `<span class="player-item">${escapeHtml(s.name)} ${s.time} (${s.team === 'home' ? m.homeTeam : m.awayTeam})</span>`).join('') || '—'}</div>
      <div><strong>🟨 YELLOW:</strong> ${(m.yellowCards || []).map(c => `<span class="player-item">${escapeHtml(c.player)} ${c.time} (${c.team === 'home' ? m.homeTeam : m.awayTeam})</span>`).join('') || '—'}</div>
      <div><strong>🟥 RED:</strong> ${(m.redCards || []).map(c => `<span class="player-item">${escapeHtml(c.player)} ${c.time} (${c.team === 'home' ? m.homeTeam : m.awayTeam})</span>`).join('') || '—'}</div>
      <button onclick="deleteMatch()" style="margin-top:20px; background:#6c757d;">🗑️ Delete Match</button>
    `;
  }

  window.updateMatch = async () => {
    const time = document.getElementById('editTime').value;
    const status = document.getElementById('editStatus').value;
    const stadium = document.getElementById('editStadium').value;
    const homeScore = parseInt(document.getElementById('editHomeScore').value);
    const awayScore = parseInt(document.getElementById('editAwayScore').value);
    const homeFormation = document.getElementById('editHomeFormation').value;
    const awayFormation = document.getElementById('editAwayFormation').value;
    await update(ref(db, `matches/${currentMatchId}`), { time, status, stadium, homeScore, awayScore, homeFormation, awayFormation });
    alert('Match updated');
  };

  window.updateStats = async () => {
    const stats = {
      possession: { home: parseInt(document.getElementById('homePoss').value), away: parseInt(document.getElementById('awayPoss').value) },
      totalShots: { home: parseInt(document.getElementById('homeTotalShots').value), away: parseInt(document.getElementById('awayTotalShots').value) },
      shotsOnTarget: { home: parseInt(document.getElementById('homeSOT').value), away: parseInt(document.getElementById('awaySOT').value) },
      bigChances: { home: parseInt(document.getElementById('homeBigChances').value), away: parseInt(document.getElementById('awayBigChances').value) },
      corners: { home: parseInt(document.getElementById('homeCorners').value), away: parseInt(document.getElementById('awayCorners').value) },
      passesPercent: { home: parseInt(document.getElementById('homePassPct').value), away: parseInt(document.getElementById('awayPassPct').value) }
    };
    await update(ref(db, `matches/${currentMatchId}`), { stats });
    alert('Stats updated');
  };

  window.setMotm = async () => {
    const motm = document.getElementById('motmSelect').value;
    await update(ref(db, `matches/${currentMatchId}`), { manOfTheMatch: motm || null });
    alert('Man of the Match set');
  };

  window.addGoal = async () => {
  const name = document.getElementById('scorerName').value.trim();
  const minute = document.getElementById('scorerTime').value.trim();
  const assist = document.getElementById('scorerAssist').value.trim();
  const team = document.getElementById('scorerTeam').value;
  if (!name || !minute) return alert('Enter player name and minute');
  const scorers = [...(matches[currentMatchId].scorers || [])];
  const goalData = { name, time: minute, team };
  if (assist) goalData.assist = assist;
  scorers.push(goalData);
  await update(ref(db, `matches/${currentMatchId}`), { scorers });
  document.getElementById('scorerName').value = '';
  document.getElementById('scorerTime').value = '';
  document.getElementById('scorerAssist').value = '';
  alert('Goal added');
};

  window.addYellow = async () => {
    const player = document.getElementById('yellowPlayer').value.trim();
    const minute = document.getElementById('yellowTime').value.trim();
    const team = document.getElementById('yellowTeam').value;
    if (!player || !minute) return alert('Enter player name and minute');
    const cards = [...(matches[currentMatchId].yellowCards || [])];
    cards.push({ player, time: minute, team });
    await update(ref(db, `matches/${currentMatchId}`), { yellowCards: cards });
    document.getElementById('yellowPlayer').value = '';
    document.getElementById('yellowTime').value = '';
    alert('Yellow card added');
  };

  window.addRed = async () => {
    const player = document.getElementById('redPlayer').value.trim();
    const minute = document.getElementById('redTime').value.trim();
    const team = document.getElementById('redTeam').value;
    if (!player || !minute) return alert('Enter player name and minute');
    const cards = [...(matches[currentMatchId].redCards || [])];
    cards.push({ player, time: minute, team });
    await update(ref(db, `matches/${currentMatchId}`), { redCards: cards });
    document.getElementById('redPlayer').value = '';
    document.getElementById('redTime').value = '';
    alert('Red card added');
  };

  window.addPlayer = async (team) => {
    const num = document.getElementById(`${team}PlayerNum`).value.trim();
    const name = document.getElementById(`${team}PlayerName`).value.trim();
    const pos = document.getElementById(`${team}PlayerPos`).value;
    if (!num || !name) return alert('Enter number and name');
    const lineupKey = team === 'home' ? 'homeLineup' : 'awayLineup';
    const current = [...(matches[currentMatchId][lineupKey] || [])];
    current.push({ number: num, name, position: pos });
    await update(ref(db, `matches/${currentMatchId}`), { [lineupKey]: current });
    document.getElementById(`${team}PlayerNum`).value = '';
    document.getElementById(`${team}PlayerName`).value = '';
    loadEditor(currentMatchId);
  };

  window.removePlayer = async (team, playerName) => {
    const lineupKey = team === 'home' ? 'homeLineup' : 'awayLineup';
    const current = [...(matches[currentMatchId][lineupKey] || [])];
    const updated = current.filter(p => p.name !== playerName);
    await update(ref(db, `matches/${currentMatchId}`), { [lineupKey]: updated });
    loadEditor(currentMatchId);
  };

  window.addSub = async (team) => {
    const num = document.getElementById(`${team}SubNum`).value.trim();
    const name = document.getElementById(`${team}SubName`).value.trim();
    const pos = document.getElementById(`${team}SubPos`).value;
    if (!num || !name) return alert('Enter number and name');
    const subsKey = team === 'home' ? 'homeSubs' : 'awaySubs';
    const current = [...(matches[currentMatchId][subsKey] || [])];
    current.push({ number: num, name, position: pos });
    await update(ref(db, `matches/${currentMatchId}`), { [subsKey]: current });
    document.getElementById(`${team}SubNum`).value = '';
    document.getElementById(`${team}SubName`).value = '';
    loadEditor(currentMatchId);
  };

  window.removeSub = async (team, playerName) => {
    const subsKey = team === 'home' ? 'homeSubs' : 'awaySubs';
    const current = [...(matches[currentMatchId][subsKey] || [])];
    const updated = current.filter(p => p.name !== playerName);
    await update(ref(db, `matches/${currentMatchId}`), { [subsKey]: updated });
    loadEditor(currentMatchId);
  };

  window.deleteMatch = async () => {
    if (!confirm('Delete this match permanently?')) return;
    await remove(ref(db, `matches/${currentMatchId}`));
    alert('Match deleted');
  };

  window.createMatch = async () => {
    const home = document.getElementById('newHomeTeam').value.trim();
    const away = document.getElementById('newAwayTeam').value.trim();
    if (!home || !away) return alert('Enter both team names');
    const newMatchRef = push(ref(db, 'matches'));
    await set(newMatchRef, {
      homeTeam: home, awayTeam: away,
      homeScore: 0, awayScore: 0,
      scorers: [], yellowCards: [], redCards: [],
      homeLineup: [], awayLineup: [], homeSubs: [], awaySubs: [],
      status: 'UPCOMING', time: '--', stadium: '',
      homeFormation: '4-4-2', awayFormation: '4-4-2',
      stats: { possession: { home: 50, away: 50 }, totalShots: { home: 0, away: 0 }, shotsOnTarget: { home: 0, away: 0 }, bigChances: { home: 0, away: 0 }, corners: { home: 0, away: 0 }, passesPercent: { home: 0, away: 0 } }
    });
    document.getElementById('newHomeTeam').value = '';
    document.getElementById('newAwayTeam').value = '';
    alert('Match created');
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
  }

  document.getElementById('matchSelect').addEventListener('change', (e) => {
    if (e.target.value) loadEditor(e.target.value);
  }); 
</script>
</body>
</html>
